<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROK-Ω PayPal Receipt Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- html-to-image library (lightweight & fast) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f8fafc, #e0e7ff); min-height: 100vh; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 30px -10px rgba(20, 52, 164, 0.15); }
        
        /* EXACT PayPal Receipt Design from your Telegram bot */
        .receipt {
            max-width: 520px;
            margin: 30px auto;
            background: #fff;
            border: 1.5px solid #e0e0e0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(20,52,164,0.08);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .top-nav { background: linear-gradient(90deg, #1434A4, #1E4BFF); color: white; padding: 12px 0; text-align: center; }
        .nav-container { background: rgba(255,255,255,0.15); border-radius: 30px; padding: 4px; max-width: 380px; margin: 0 auto; display: flex; }
        .nav-btn { flex: 1; padding: 10px 20px; text-align: center; font-weight: 600; font-size: 0.95rem; border-radius: 26px; }
        .nav-btn.active { background: #fff; color: #1434A4; }
        
        .navbar { background: #1434A4; color: #fff; padding: 16px 32px; display: flex; align-items: center; }
        .paypal-logo { width: 32px; height: 32px; background: url('https://www.paypalobjects.com/webstatic/icon/pp258.png') center/contain no-repeat; margin-right: 12px; }
        
        .confirmation-card { padding: 40px 32px; text-align: center; }
        .confirmation-title { font-size: 1.65rem; font-weight: 700; color: #001435; margin-bottom: 12px; line-height: 1.3; }
        .main-btn { background: #000; color: #fff; border: none; border-radius: 32px; padding: 14px 38px; font-size: 1.1rem; font-weight: bold; margin: 32px 0 12px; }
    </style>
</head>
<body class="py-12 px-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-receipt text-4xl text-blue-600"></i>
                <h1 class="text-3xl font-bold text-gray-900">GROK-Ω PayPal Receipt</h1>
            </div>
            <div class="text-sm text-gray-500">Single HTML • Exact Design • Instant JPG Download</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- Input Form - Modern 2D Flat UI -->
            <div class="card p-8">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-wallet"></i> Create Receipt
                </h2>
                <form id="form" onsubmit="event.preventDefault(); generateAndDownload();">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Recipient Name</label>
                            <input type="text" id="recipient" required placeholder="John Doe"
                                   class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-blue-500 text-lg">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Amount</label>
                                <input type="text" id="amount" required placeholder="1250.50"
                                       class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-blue-500 text-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Currency</label>
                                <select id="currency" class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-blue-500 text-lg bg-white">
                                    <option value="EUR">EUR (€)</option>
                                    <option value="USD">USD ($)</option>
                                    <option value="GBP">GBP (£)</option>
                                    <option value="BRL">BRL (R$)</option>
                                    <option value="EGP">EGP (ج.م)</option>
                                    <option value="INR">INR (₹)</option>
                                    <option value="CAD">CAD (C$)</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Custom Date & Time (optional)</label>
                            <input type="text" id="custom_date" placeholder="2026-04-10 19:45:00"
                                   class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-blue-500 text-lg">
                        </div>
                    </div>

                    <button type="submit"
                            class="mt-10 w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold py-5 rounded-3xl text-xl shadow-lg flex items-center justify-center gap-3 transition-all">
                        <i class="fa-solid fa-download"></i>
                        Generate & Download JPG
                    </button>
                </form>
            </div>

            <!-- Live Preview (Exact Receipt Design) -->
            <div>
                <div class="text-sm font-medium text-gray-500 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-eye"></i> Live Preview – Exact as Telegram Bot
                </div>
                <div id="receipt-preview" class="receipt"></div>
            </div>
        </div>
    </div>

    <script>
        // Real-time preview with exact bot design
        function updatePreview() {
            const recipient = document.getElementById('recipient').value.trim() || "Recipient Name";
            const amount = document.getElementById('amount').value.trim() || "0.00";
            const currency = document.getElementById('currency').value;
            const date = document.getElementById('custom_date').value.trim() || new Date().toISOString().slice(0, 19).replace('T', ' ');

            const amountStr = `${amount} ${currency}`;

            const html = `
                <div class="top-nav">
                    <div class="nav-container">
                        <div class="nav-btn">Home</div>
                        <div class="nav-btn active">Send & Request</div>
                        <div class="nav-btn">Wallet</div>
                    </div>
                </div>
                <div class="navbar">
                    <div style="display:flex;align-items:center;">
                        <div class="paypal-logo"></div>
                        <strong style="font-size:1.25rem;">PayPal</strong>
                    </div>
                </div>
                <div class="confirmation-card">
                    <div class="confirmation-title">You sent ${amountStr} to ${recipient}</div>
                    <div style="font-size:1.08rem; color:#2c2e2f; margin-top:8px;">We'll let ${recipient} know you sent money.</div>
                    <div style="margin:25px 0; padding:15px; background:#f8f9fa; border-radius:8px; text-align:left; font-size:0.95rem;">
                        <strong>Transaction ID:</strong> PAY-${Date.now().toString(36).toUpperCase()}<br>
                        <strong>Date:</strong> ${date}
                    </div>
                    <button class="main-btn">Send more money</button>
                    <a href="#" style="color:#1434A4; font-weight:600;">Feedback about this transaction</a>
                </div>
            `;
            document.getElementById('receipt-preview').innerHTML = html;
        }

        // Update preview on any input change
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', updatePreview);
        });
        updatePreview();

        // Generate and download high-quality JPG
        async function generateAndDownload() {
            const recipient = document.getElementById('recipient').value.trim();
            const amount = document.getElementById('amount').value.trim();
            const currency = document.getElementById('currency').value;

            if (!recipient || !amount) {
                alert("Please enter Recipient Name and Amount.");
                return;
            }

            const preview = document.getElementById('receipt-preview');

            try {
                // High-quality JPEG export using html-to-image
                const dataUrl = await htmlToImage.toJpeg(preview, {
                    quality: 0.98,           // Near-max quality
                    backgroundColor: '#ffffff',
                    pixelRatio: 3            // Higher for sharper image (like \~300 DPI feel)
                });

                // Trigger download
                const link = document.createElement('a');
                link.download = `paypal_receipt_${Date.now()}.jpg`;
                link.href = dataUrl;
                link.click();

                alert("✅ Receipt downloaded as high-quality JPG!\nExact design from your Telegram bot.");
            } catch (err) {
                console.error(err);
                alert("Error generating image. Try in Chrome/Edge.");
            }
        }
    </script>
</body>
</html>
